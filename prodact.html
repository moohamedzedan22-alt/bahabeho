    <script>
    function getProductName(product) {
        var lang = localStorage.getItem("lang") || "en";
        return lang === "ar" ? product.nameAr : product.nameEn;
    }
    
    function renderProducts() {
        // Load fresh from IndexedDB
        DermaCareDB.getAllProducts(function(err, products) {
            if (err || !products.length) {
                // Fallback: seed from defaults then re-render
                DermaCareDB.seedIfEmpty(DEFAULT_PRODUCTS, function() {
                    DermaCareDB.getAllProducts(function(err2, prods) {
                        _doRender(prods || []);
                    });
                });
                return;
            }
            _doRender(products);
        });
    }

    function getImgSrc(p) {
        return p.imageData || p.image || '';
    }

    function _doRender(prodacts) {
        var container = document.getElementById("contaner");
        container.innerHTML = "";
        var btnText = localStorage.getItem("lang") === "ar" ? "عرض المنتج" : "view product";
        prodacts = prodacts.sort(function(a,b){ return (a.createdAt||0)-(b.createdAt||0); });
        prodacts.forEach(function(prodact) {
            var imgSrc = getImgSrc(prodact);
            var imgTag = imgSrc
                ? "<img class='image' src='" + imgSrc + "' onclick='goToprodact(" + prodact.id + ")' onerror=\"this.style.background='#fde8ec';this.src=''\">"
                : "<div class='image' style='width:100%;height:100%;background:#fde8ec;display:flex;align-items:center;justify-content:center;font-size:2.5rem;cursor:pointer' onclick='goToprodact(" + prodact.id + ")'>🌸</div>";
            
            var descText = prodact.description || (localStorage.getItem("lang") === "ar" ? "منتج عالي الجودة للعناية بجمالك." : "Premium quality beauty product for daily care.");
            
            container.innerHTML += "<div class='car'>" 
                + "<div class='car-img-wrapper'>" + imgTag + "</div>"
                + "<div class='car-body'>"
                + "<h3 onclick='goToprodact(" + prodact.id + ")'>" + getProductName(prodact) + "</h3>"
                + "<p class='car-desc'>" + descText + "</p>"
                + "<div class='pric'>" + prodact.price + " LE</div>"
                + "<button class='bt' onclick='goToprodact(" + prodact.id + ")'>" + btnText + "</button>"
                + "</div></div>";
        });
    }
    
    function goToprodact(id) {
        window.location.href = "image.html?id=" + id;
    }
    
    function toggleMenu() {
        document.getElementById("navMenu").classList.toggle("active");
    }

    function updateAdminIcon() {
        var adminLink = document.getElementById("adminNavLink");
        var lang = localStorage.getItem("lang") || "en";
        if (adminLink) {
            if (DC_isAdminLoggedIn()) {
                adminLink.innerHTML = '<span class="admin-icon">⚙️</span> ' + (lang === "ar" ? "لوحة التحكم" : "Admin");
            } else {
                adminLink.innerHTML = '<span class="admin-icon">👤</span> ' + (lang === "ar" ? "تسجيل الدخول" : "Login");
            }
        }
    }
    
    document.addEventListener("DOMContentLoaded", function() {
        var savedLang = localStorage.getItem("lang");
        if (savedLang) {
            document.body.dir = savedLang === "ar" ? "rtl" : "ltr";
            document.getElementById("langBtn").textContent = savedLang === "en" ? "العربية" : "English";
        }
        renderProducts();
        updateContent();
        updateAdminIcon();
    });
    </script>
